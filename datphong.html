<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu đặc biệt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Yêu cầu đặc biệt</h2>

    <p>Chọn loại giường</p>

    <div class="bed">
        <label>
            <input type="radio" name="bed">
            1 giường King
        </label>

        <label>
            <input type="radio" name="bed">
            2 giường đơn
        </label>
    </div>

    <div class="box">
        <h3>Yêu cầu đặc biệt</h3>

        <label class="check">
            <input type="checkbox">
            Phòng không hút thuốc
        </label>

        <label class="check">
            <input type="checkbox">
            Phòng ở tầng cao
        </label>

        <h3>Yêu cầu riêng của bạn</h3>

        <textarea placeholder="Nhập yêu cầu khác"></textarea>

        <button>Thanh toán</button>
    </div>
</div>

</body>
</html>
